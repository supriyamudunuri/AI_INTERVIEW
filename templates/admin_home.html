<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Home Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%), url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            background-blend-mode: overlay;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .container-bg {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .action-button {
            border: 2px solid #4F46E5; /* Indigo border for buttons */
            transition: all 0.3s ease-in-out;
        }
        .action-button:hover {
            transform: translateY(-3px);
            background-color: #4F46E5;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        .welcome-text {
            animation: slideIn 0.8s ease-out;
        }
        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="container-bg rounded-2xl shadow-2xl p-8 max-w-lg w-full fade-in text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-6 welcome-text">Welcome Admin!</h1>
        <div class="space-y-4">
            <p>
                <a href="{% url 'admin_dashboard' %}" class="action-button inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg w-full transition-all duration-300">
                    Go to Dashboard
                </a>
            </p>

            <p>
                <a href="{% url 'all_results' %}" class="action-button inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg w-full transition-all duration-300">
                    Interview Results
                </a>
            </p>

            <p>
                <a href="{% url 'user_logout' %}" class="action-button inline-block bg-red-500 text-white px-6 py-3 rounded-lg w-full transition-all duration-300 hover:bg-red-600">
                    Logout
                </a>
            </p>
        </div>
    </div>
</body>
</html>
