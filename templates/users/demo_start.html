{% extends "users/user_base.html" %}

{% block content %}
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-yellow-50 p-8 rounded-lg shadow-lg animate-slide-in border-l-4 border-yellow-400">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <!-- Form Section -->
                <div class="md:w-1/2">
                    <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-yellow-600 to-orange-600 mb-6">Try Demo Interview 🎭</h2>
                    <p class="text-gray-600 mb-6">Experience our AI-powered interview system. Fill in the details below for a demo interview (no data saved).</p>
                    <form method="post" class="space-y-6">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="w-full bg-yellow-600 text-white px-6 py-3 rounded-md hover:bg-yellow-700 transition flex items-center justify-center">
                            Start Demo Interview 🚀
                        </button>
                    </form>
                </div>
                <!-- Image Section -->
                <div class="md:w-1/2">
                    <img src="https://images.unsplash.com/photo-1551434678-e076c223a692?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Demo Interview" class="w-full h-auto rounded-lg shadow-md animate-float">
                </div>
            </div>
        </div>
    </div>
    <style>
        /* Custom styles for input field borders */
        input, textarea, select {
            border: 2px solid #D97706 !important; /* Yellow border for demo */
            transition: border-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #92400E !important; /* Darker yellow on focus */
            outline: none;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }
        /* Ensure animations are preserved */
        .animate-slide-in {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
{% endblock %}
