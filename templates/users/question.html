<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Question</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
            background-attachment: fixed;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        button:hover {
            transform: translateY(-2px);
            transition: transform 0.2s ease-in-out;
        }
        textarea, input {
            border: 2px solid #4F46E5 !important; /* Indigo border for input fields */
            transition: border-color 0.3s ease-in-out;
        }
        textarea:focus, input:focus {
            border-color: #7C3AED !important; /* Lighter purple on focus */
            outline: none;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }
        .container-bg {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="container-bg rounded-2xl shadow-2xl p-8 max-w-2xl w-full fade-in">
        {% if demo %}
        <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 mb-6">
            <p class="font-bold">Demo Mode</p>
            <p>This is a demo interview. Your responses will not be saved.</p>
        </div>
        {% endif %}
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">AI Interview Question</h2>
        <p id="question-text" class="text-lg text-gray-700 bg-gray-50 p-4 rounded-lg mb-6">{{ question }}</p>

        <div class="flex flex-col items-center space-y-3 mb-6">
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="speakText()" class="bg-blue-500 text-white px-6 py-3 rounded-lg flex items-center space-x-2 hover:bg-blue-600 transition-colors">
                    <span>🔊</span><span>Read Question</span>
                </button>
                <button onclick="startListening()" class="bg-green-500 text-white px-6 py-3 rounded-lg flex items-center space-x-2 hover:bg-green-600 transition-colors">
                    <span>🎤</span><span>Start Speaking</span>
                </button>
                <button onclick="captureEmotion()" class="bg-purple-500 text-white px-6 py-3 rounded-lg flex items-center space-x-2 hover:bg-purple-600 transition-colors">
                    <span>📷</span><span>Capture Emotion</span>
                </button>
            </div>
            <p id="speech-status" class="text-sm text-gray-600 italic">Click "Start Speaking" and allow microphone access.</p>
        </div>
        <video id="video" width="320" height="240" autoplay style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <form method="post" action="{% url 'answer_question' %}" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition-colors">Submit Answer</button>
        </form>

        <p class="text-sm text-gray-500 italic text-center mt-4">Your voice input will appear in the text box</p>
    </div>

    <script>
        // ---------- Text-to-Speech ----------
        function speakText() {
            const text = document.getElementById('question-text').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        }

        // ---------- Speech-to-Text ----------
        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || window.mozSpeechRecognition || window.msSpeechRecognition;
            const status = document.getElementById('speech-status');

            if (!SpeechRecognition) {
                const message = 'Speech recognition is not available in this browser. Use Chrome or Edge on localhost / HTTPS.';
                alert(message);
                if (status) status.textContent = message;
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onstart = function() {
                if (status) status.textContent = 'Listening... please speak now.';
            };

            recognition.onresult = function(event) {
                const spokenText = event.results[0][0].transcript;
                const textarea = document.querySelector('textarea[name="answer"]') || document.querySelector('textarea');
                if (textarea) {
                    textarea.value = spokenText;
                }
                if (status) status.textContent = 'Captured speech: ' + spokenText;
            };

            recognition.onerror = function(event) {
                const message = 'Speech recognition failed: ' + event.error;
                alert(message);
                if (status) status.textContent = message;
            };

            recognition.onend = function() {
                if (status && status.textContent.includes('Listening')) {
                    status.textContent = 'Speech recognition ended. Click again to speak.';
                }
            };

            try {
                recognition.start();
            } catch (error) {
                const message = 'Unable to start speech recognition: ' + error.message;
                alert(message);
                if (status) status.textContent = message;
            }
        }

        // ---------- Emotion Capture ----------
        async function captureEmotion() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                // video.style.display = 'block'; // Keep hidden for automatic capture

                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0);
                    const imageData = canvas.toDataURL('image/png');

                    // Send to backend
                    const payload = { image: imageData };
                    {% if current_question_id %}
                    payload.question_id = {{ current_question_id }};
                    {% endif %}
                    fetch('/capture_emotion/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        },
                        body: JSON.stringify(payload)
                    }).then(response => {
                        if (response.ok) {
                            console.log('Emotion captured successfully');
                        } else {
                            console.error('Failed to capture emotion');
                        }
                    });

                    stream.getTracks().forEach(track => track.stop());
                    // video.style.display = 'none';
                }, 2000);
            } catch (error) {
                console.error('Error accessing webcam: ' + error.message);
            }
        }

        // Automatically capture emotion when page loads
        window.addEventListener('load', function() {
            setTimeout(captureEmotion, 1500); // Delay to ensure page is fully loaded
        });
    </script>
</body>
</html>
