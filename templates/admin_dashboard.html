<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%), url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            background-blend-mode: overlay;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .container-bg {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        table {
            width: 90%;
            margin: 2rem auto;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 1rem;
            text-align: center;
            border: 2px solid #4F46E5; /* Indigo border for table cells */
        }
        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #1f2937;
        }
        td {
            background-color: #ffffff;
        }
        tr:hover td {
            background-color: #f1f5f9;
            transition: background-color 0.2s ease-in-out;
        }
        .action-button {
            border: 2px solid #4F46E5; /* Indigo border for buttons */
            transition: all 0.3s ease-in-out;
        }
        .action-button:hover {
            transform: translateY(-2px);
            background-color: #4F46E5;
            color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .deactivate-button:hover {
            background-color: #dc2626;
            border-color: #dc2626;
        }
        .delete-button:hover {
            background-color: #991b1b;
            border-color: #991b1b;
        }
        img {
            border-radius: 0.25rem;
            border: 2px solid #4F46E5; /* Indigo border for images */
            object-fit: cover;
        }
        .active-status {
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            display: inline-block;
        }
        .active-true {
            background-color: #d1fae5;
            color: #065f46;
        }
        .active-false {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .nav-link {
            transition: all 0.3s ease-in-out;
        }
        .nav-link:hover {
            transform: translateY(-2px);
            background-color: #4F46E5;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="container-bg rounded-2xl shadow-2xl p-8 max-w-5xl w-full fade-in">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Admin Dashboard</h2>
        <div class="flex justify-center space-x-4 mb-6">
            <a href="{% url 'admin_home' %}" class="nav-link inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg action-button">Back to Home</a>
            <a href="{% url 'user_logout' %}" class="nav-link inline-block bg-red-500 text-white px-6 py-3 rounded-lg action-button hover:bg-red-600">Logout</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>Image</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.mobile }}</td>
                    <td><img src="{{ user.image.url }}" width="60" alt="{{ user.name }}'s profile image" /></td>
                    <td>
                        <span class="active-status {% if user.is_active %}active-true{% else %}active-false{% endif %}">
                            {{ user.is_active|yesno:"Active,Inactive" }}
                        </span>
                    </td>
                    <td>
                        {% if not user.is_active %}
                            <a href="{% url 'activate_user' user.id %}" class="action-button inline-block bg-green-500 text-white px-3 py-1 rounded-lg">Activate</a>
                        {% else %}
                            <a href="{% url 'deactivate_user' user.id %}" class="action-button deactivate-button inline-block bg-red-500 text-white px-3 py-1 rounded-lg">Deactivate</a>
                        {% endif %}
                        <a href="{% url 'delete_user' user.id %}" class="action-button delete-button inline-block bg-gray-600 text-white px-3 py-1 rounded-lg">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
